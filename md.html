<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Документ | AIM Site Hub</title>
    <style>
      :root {
        --bg: #050505;
        --ink: #fffaf0;
        --muted: rgba(255, 250, 240, 0.6);
        --soft: rgba(255, 250, 240, 0.22);
        --hair: rgba(255, 250, 240, 0.12);
        --pale: rgba(255, 250, 240, 0.05);
        --accent: #ff4d4d;
        --ok: #1dc263;
        --mono: "SF Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: var(--mono);
        font-size: 13px;
        line-height: 1.65;
      }
      .top {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
        padding: 12px 22px;
        border-bottom: 1px solid var(--soft);
        background: rgba(5, 5, 5, 0.85);
        backdrop-filter: blur(10px);
      }
      .brand { display: flex; gap: 10px; align-items: center; font-weight: 700; }
      .brand-mark {
        width: 24px; height: 24px; display: grid; place-items: center;
        background: var(--ink); color: var(--bg); font-size: 9px;
      }
      .top a {
        color: var(--ink); font-size: 10px; font-weight: 700;
        letter-spacing: 0.1em; text-transform: uppercase; text-decoration: none;
        border: 1px solid var(--soft); border-radius: 999px; padding: 6px 12px;
      }
      .top a:hover { background: var(--ink); color: var(--bg); }
      main { max-width: 860px; margin: 0 auto; padding: 30px 20px 80px; }
      .doc-path { color: var(--muted); font-size: 10px; margin-bottom: 18px; overflow-wrap: anywhere; }
      #content h1, #content h2, #content h3 {
        line-height: 1.25; letter-spacing: 0.01em;
        margin: 1.6em 0 0.5em;
      }
      #content h1 { font-size: 24px; margin-top: 0.4em; }
      #content h2 { font-size: 17px; border-bottom: 1px solid var(--hair); padding-bottom: 6px; }
      #content h3 { font-size: 14px; color: var(--ok); }
      #content a { color: #8fb8ff; }
      #content code {
        background: var(--pale); border: 1px solid var(--hair);
        border-radius: 4px; padding: 1px 5px; font-size: 12px;
      }
      #content pre {
        background: var(--pale); border: 1px solid var(--hair);
        border-radius: 10px; padding: 14px; overflow-x: auto;
      }
      #content pre code { background: none; border: 0; padding: 0; }
      #content blockquote {
        margin: 1em 0; padding: 4px 16px; border-left: 3px solid var(--accent);
        color: var(--muted);
      }
      #content table { border-collapse: collapse; width: 100%; margin: 1em 0; display: block; overflow-x: auto; }
      #content th, #content td { border: 1px solid var(--hair); padding: 6px 10px; text-align: left; vertical-align: top; }
      #content th { background: var(--pale); }
      #content hr { border: 0; border-top: 1px solid var(--hair); margin: 2em 0; }
      #content ul, #content ol { padding-left: 22px; }
      #content li { margin: 3px 0; }
      .err { color: var(--accent); }
    </style>
  </head>
  <body>
    <header class="top">
      <div class="brand"><div class="brand-mark">AIM</div><span id="doc-title">Документ</span></div>
      <nav style="display:flex; gap:8px;">
        <a href="index.html">← хаб</a>
        <a id="download-link" href="#" download>⬇ скачать md</a>
      </nav>
    </header>
    <main>
      <p class="doc-path" id="doc-path"></p>
      <div id="content">Загрузка…</div>
    </main>
    <script>
      const esc = (s) => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

      function inline(s) {
        return s
          .replace(/`([^`]+)`/g, (m, c) => `<code>${c}</code>`)
          .replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, (m, t, u) => {
            if (/^\s*javascript:/i.test(u)) return t;
            return `<a href="${u}" target="_blank" rel="noopener noreferrer">${t}</a>`;
          })
          .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
          .replace(/(^|[\s(])\*([^*\n]+)\*(?=[\s).,;:!?]|$)/g, '$1<em>$2</em>');
      }

      function renderMd(src) {
        const lines = esc(src.replace(/\r\n/g, '\n')).split('\n');
        const out = [];
        let i = 0, list = null, para = [];
        const flushPara = () => { if (para.length) { out.push(`<p>${inline(para.join(' '))}</p>`); para = []; } };
        const flushList = () => { if (list) { out.push(`</${list}>`); list = null; } };

        while (i < lines.length) {
          const line = lines[i];

          if (/^```/.test(line)) {
            flushPara(); flushList();
            const buf = []; i++;
            while (i < lines.length && !/^```/.test(lines[i])) buf.push(lines[i++]);
            i++;
            out.push(`<pre><code>${buf.join('\n')}</code></pre>`);
            continue;
          }
          if (/^\|/.test(line)) {
            flushPara(); flushList();
            const rows = [];
            while (i < lines.length && /^\|/.test(lines[i])) rows.push(lines[i++]);
            const cells = (r) => r.replace(/^\||\|$/g, '').split('|').map((c) => inline(c.trim()));
            let html = '<table>';
            rows.forEach((r, idx) => {
              if (/^\|[\s:|-]+\|?$/.test(r)) return;
              const tag = idx === 0 ? 'th' : 'td';
              html += `<tr>${cells(r).map((c) => `<${tag}>${c}</${tag}>`).join('')}</tr>`;
            });
            out.push(html + '</table>');
            continue;
          }
          const h = line.match(/^(#{1,4})\s+(.*)/);
          if (h) {
            flushPara(); flushList();
            out.push(`<h${h[1].length}>${inline(h[2])}</h${h[1].length}>`);
            i++; continue;
          }
          if (/^(-{3,}|\*{3,})\s*$/.test(line)) { flushPara(); flushList(); out.push('<hr />'); i++; continue; }
          const q = line.match(/^>\s?(.*)/);
          if (q) {
            flushPara(); flushList();
            const buf = [q[1]];
            i++;
            while (i < lines.length && /^>\s?/.test(lines[i])) buf.push(lines[i++].replace(/^>\s?/, ''));
            out.push(`<blockquote><p>${inline(buf.join(' '))}</p></blockquote>`);
            continue;
          }
          const ul = line.match(/^\s*[-*]\s+(.*)/);
          const ol = line.match(/^\s*\d+[.)]\s+(.*)/);
          if (ul || ol) {
            flushPara();
            const want = ul ? 'ul' : 'ol';
            if (list !== want) { flushList(); out.push(`<${want}>`); list = want; }
            out.push(`<li>${inline((ul || ol)[1])}</li>`);
            i++; continue;
          }
          if (/^\s*$/.test(line)) { flushPara(); flushList(); i++; continue; }
          para.push(line.trim());
          i++;
        }
        flushPara(); flushList();
        return out.join('\n');
      }

      const params = new URLSearchParams(location.search);
      const file = params.get('f') || '';
      const content = document.querySelector('#content');
      const safe = file && !/^([a-z]+:)?\/\//i.test(file) && !file.includes('..');
      if (!safe) {
        content.innerHTML = '<p class="err">Не указан файл или путь недопустим. Пример: md.html?f=website-ops/qa-weekly-digest.md</p>';
      } else {
        document.querySelector('#doc-path').textContent = file;
        const dl = document.querySelector('#download-link');
        dl.href = file;
        dl.setAttribute('download', file.split('/').pop());
        fetch(file)
          .then((r) => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.text(); })
          .then((text) => {
            content.innerHTML = renderMd(text);
            const h1 = content.querySelector('h1');
            const name = h1 ? h1.textContent : file.split('/').pop();
            document.querySelector('#doc-title').textContent = name;
            document.title = `${name} | AIM Site Hub`;
          })
          .catch((e) => { content.innerHTML = `<p class="err">Не удалось загрузить ${esc(file)}: ${esc(String(e.message || e))}</p>`; });
      }
    </script>
  </body>
</html>
